<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card con Flexbox y Grid</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <article class="card">
            <header class="card-header">
                <div class="header-image">
                    <img src="assets/images/punch.jpg" alt="One Punch Man">
                </div>
                <div class="card-info">
                    <h2>One Punch Man</h2>
                    <h3>Saitama</h3>
                </div>
            </header>
            <img src="assets/images/opm.jpg" alt="One Punch Man Cast">
            <footer class="card-footer">
                <p>El héroe que derrota todo de un solo golpe.</p>
                <div class="card-cta">
                    <div class="card-buttons">
                        <button class="btn-primary">Ver más</button>
                        <button class="btn-secondary">Trailer</button>
                    </div>
                    <div class="card-icons">
                        <a href="#">
                            <img src="assets/icons/like.svg" alt="Like">
                        </a>
                        <a href="#">
                            <img src="assets/icons/share.svg" alt="Share">
                        </a>
                    </div>
                </div>
            </footer>
        </srticle>
    </main>
</body>
</html>
