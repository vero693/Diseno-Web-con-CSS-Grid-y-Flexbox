<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="wrapper">
        <header>
            <p>Playing now</p>
        </header>
        <section class="cards">
            <div>
                <img src="assets/images/IronMaiden_NumberOfBeast.jpg" alt="Iron Maiden: Number of the Beast album">
            </div>
            <div>
                <img src="assets/images/metallica-the-black-album.jpg" alt="Metallica: The Black Album">
            </div>
            <div>
                <img src="assets/images/hybrid-theory-by-linkin-park.webp" alt="Linkin Park: Hybrid Theory">
            </div>
        </section>
        <section class="progress-bar">
            <div class="song-info">
                <p>Wherever I may roam</p>
                <p>Metallica</p>
            </div>
            <div class="time-bar"></div>
            <div class="time">
                <span>1:35</span>
                <span>6:47</span>
            </div>
        </section>
        <footer>
            <div class="cta">
                <button>
                    <img src="assets/icons/shuffle.svg" alt="Aleatorio">
                </button>
                <button>
                    <img src="assets/icons/skip-back.svg" alt="Retrasar">
                </button>
                <button>
                    <img src="assets/icons/play.svg" alt="">
                </button>
                <button>
                    <img src="assets/icons/skip-forward.svg" alt="Adelantar">
                </button>
                <button>
                    <img src="assets/icons/repeat.svg" alt="Repetir">
                </button>
            </div>
        </footer>
    </div>
    <script>
        window.addEventListener("load", () => {
            const container = document.querySelector(".cards");
            const secondCard = container.children[1];

            container.scrollLeft = secondCard.offsetLeft - container.offsetWidth / 2 + secondCard.offsetWidth / 2;
        });
    </script>
</body>
</html>
